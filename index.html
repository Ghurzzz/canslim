<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CANSLIM Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #05070f;
  --bg2: #0d1117;
  --bg3: #161b24;
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #4b5563;
  --green: #10b981;
  --green2: #34d399;
  --red: #ef4444;
  --red2: #f87171;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --orange: #f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#0d1117 0%,#111827 100%);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;max-width:1400px;margin:0 auto}
.logo{display:flex;align-items:baseline;gap:8px}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.timestamp{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(16,185,129,0)}}

/* TABS */
.tabs{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto}
.tab{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;letter-spacing:.5px;border:1px solid transparent;transition:all .2s;white-space:nowrap;background:none;color:var(--muted)}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border)}
.tab.portfolio-tab.active{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.3)}

/* STATS BAR */
.stats{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.stat-pill.green{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.25)}
.stat-pill.red{background:rgba(239,68,68,.1);color:var(--red2);border-color:rgba(239,68,68,.25)}
.stat-pill.yellow{background:rgba(245,158,11,.1);color:var(--yellow);border-color:rgba(245,158,11,.25)}
.stat-pill.blue{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.25)}
.stat-pill.muted{background:var(--bg3);color:var(--muted);border-color:var(--border)}
.stat-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* GRID */
.main{padding:16px 20px;max-width:1400px;margin:0 auto}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
@media(max-width:480px){.cards-grid{grid-template-columns:1fr}}

/* CARD */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:all .2s;
  position:relative;
}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card.portfolio-card{border-color:rgba(16,185,129,.2)}
.card-accent{height:3px;width:100%}
.card-body{padding:14px 16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-ticker{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1}
.card-price{text-align:right}
.price-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--text)}
.price-chg{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:4px}
.portfolio-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25);margin-left:6px;letter-spacing:.5px}

/* SIGNAL PILLS */
.signals{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.sig-pill{font-size:9px;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace}
.sig-good{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.sig-bad{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.sig-neutral{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* PRICE LEVELS */
.price-levels{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.level-cell{background:var(--bg3);border-radius:6px;padding:7px;text-align:center;border:1px solid var(--border)}
.level-label{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.level-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}

/* CHART */
.chart-wrap{position:relative;height:80px;margin-top:10px}

/* DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--text);border-color:var(--text)}
.modal-body{padding:16px 20px 20px}
.modal-chart{height:160px;margin-bottom:16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.detail-cell{background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.detail-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.detail-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}
.decision-box{border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid}
.decision-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.decision-verdict{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:10px}
.decision-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.decision-key{color:var(--muted)}
.rr-bar{height:4px;background:var(--bg);border-radius:2px;margin-top:8px;overflow:hidden}
.rr-fill{height:100%;border-radius:2px;transition:width .8s ease}
.vp-section{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);margin-bottom:14px}
.vp-title{font-size:10px;color:#60a5fa;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.vp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.vp-cell{background:var(--bg2);border-radius:6px;padding:8px;text-align:center;border:1px solid}

/* TF SELECTOR */
.tf-bar{display:flex;gap:6px;padding:0 0 14px}
.tf-btn{padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:'JetBrains Mono',monospace;transition:all .2s}
.tf-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.tf-btn.active{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.4)}
.tf-btn.recommended{position:relative}
.tf-btn.recommended::after{content:'★';position:absolute;top:-5px;right:-4px;font-size:8px;color:var(--yellow)}

/* SECTION TITLE */
.section-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-main">CANSLIM SCANNER</span>
      <span class="logo-sub">v2.0</span>
    </div>
    <div class="header-right">
      <span class="timestamp"><span class="live-dot"></span>Son güncelleme: 01.05.2026 14:39</span>

<div class="stats" id="statsBar"></div>

<div class="main">

    <span style="font-size:10px;color:var(--muted);align-self:center;margin-left:4px">★ = CANSLIM önerilen</span>
  </div>
  <div class="cards-grid" id="grid"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

const PORTFOLIO_LIST = ["MRVL", "AMD", "CLS", "ANET", "AVGO", "MU", "NVDA", "ARM"];
let currentTab = 'all';
let currentTf  = '1d';
let chartInstances = {};
let modalChart = null;

const SIGNAL_STYLE = {
  'GÜÇLÜ AL': {bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.35)',text:'#10b981',accent:'#10b981'},
  'AL':        {bg:'rgba(52,211,153,.1)', border:'rgba(52,211,153,.3)', text:'#34d399',accent:'#34d399'},
  'DİKKAT':    {bg:'rgba(245,158,11,.1)', border:'rgba(245,158,11,.3)', text:'#f59e0b',accent:'#f59e0b'},
  'ZAYIF':     {bg:'rgba(107,114,128,.1)',border:'rgba(107,114,128,.3)',text:'#9ca3af',accent:'#6b7280'},
  'SAT':       {bg:'rgba(239,68,68,.12)', border:'rgba(239,68,68,.35)', text:'#ef4444',accent:'#ef4444'},
};

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderGrid();
}

function setTf(tf) {
  currentTf = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === tf));
  renderGrid();
}

function getFiltered() {
  let data = ALL_DATA.filter(r => !r.hata);
  if (currentTab === 'portfolio') return data.filter(r => PORTFOLIO_LIST.includes(r.ticker));
  if (currentTab === 'buy')  return data.filter(r => r.sinyal === 'GÜÇLÜ AL' || r.sinyal === 'AL');
  if (currentTab === 'sell') return data.filter(r => r.sinyal === 'SAT');
  return data;
}

function renderStats() {
  const data = ALL_DATA.filter(r => !r.hata);
  const counts = {'GÜÇLÜ AL':0,'AL':0,'DİKKAT':0,'SAT':0};
  data.forEach(r => { if (counts[r.sinyal] !== undefined) counts[r.sinyal]++; });
  const port = data.filter(r => PORTFOLIO_LIST.includes(r.ticker));
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill green"><div class="stat-dot"></div>Güçlü Al: ${counts['GÜÇLÜ AL']}</div>
    <div class="stat-pill green"><div class="stat-dot"></div>Al: ${counts['AL']}</div>
    <div class="stat-pill yellow"><div class="stat-dot"></div>Dikkat: ${counts['DİKKAT']}</div>
    <div class="stat-pill red"><div class="stat-dot"></div>Sat: ${counts['SAT']}</div>
    <div class="stat-pill blue" style="margin-left:auto"><div class="stat-dot"></div>Portföy: ${port.length} hisse</div>
    <div class="stat-pill muted"><div class="stat-dot"></div>${data.length} analiz edildi</div>
  `;
}

function renderGrid() {
  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  const filtered = getFiltered();
  const grid = document.getElementById('grid');

  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Bu sekmede hisse bulunamadı</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => buildCard(r)).join('');

  // Draw mini charts
  filtered.forEach(r => {
    const ctx = document.getElementById('chart-' + r.ticker);
    if (ctx && r.chart_closes && r.chart_closes.length > 0) {
      const ss = SIGNAL_STYLE[r.sinyal] || SIGNAL_STYLE['DİKKAT'];
      chartInstances['mini-' + r.ticker] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: r.chart_dates,
          datasets: [{ data: r.chart_closes, borderColor: ss.accent, borderWidth: 1.5,
            fill: true, backgroundColor: ss.accent + '15', pointRadius: 0, tension: 0.4 }]
        },
        options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}},
          animation:{duration:600}, responsive:true, maintainAspectRatio:false }
      });
    }
  });
}

function buildCard(r) {
  const ss = SIGNAL_STYLE[r.sinyal] || SIGNAL_STYLE['DİKKAT'];
  const degCol = r.degisim >= 0 ? 'var(--green2)' : 'var(--red2)';
  const degStr = r.degisim >= 0 ? '+' + r.degisim + '%' : r.degisim + '%';
  const portBadge = r.portfolio ? '<span class="portfolio-badge">💼 Portföy</span>' : '';

  const sigs = [
    {l:'Trend', v: r.trend==='Yükselen'?'▲ Yükselen':r.trend==='Düşen'?'▼ Düşen':'→ Yatay', good: r.trend==='Yükselen'?true:r.trend==='Düşen'?false:null},
    {l:'SMA50', v: r.above50?'✓':'✗', good: r.above50},
    {l:'SMA200', v: r.above200?'✓':'✗', good: r.above200},
    {l:'52W', v: r.near_52w?'Yakın ✓':'%'+r.pct_from_52w+' uzak', good: r.near_52w},
    {l:'Hacim', v: r.hacim, good: r.hacim==='Yüksek'?true:r.hacim==='Düşük'?false:null},
  ].map(s => `<span class="sig-pill ${s.good===true?'sig-good':s.good===false?'sig-bad':'sig-neutral'}">${s.l}: ${s.v}</span>`).join('');

  return `
  <div class="card ${r.portfolio?'portfolio-card':''}" onclick="openModal('${r.ticker}')"
       style="border-color:${r.portfolio?'rgba(16,185,129,.25)':ss.border}">
    <div class="card-accent" style="background:linear-gradient(90deg,${ss.accent},${ss.accent}88)"></div>
    <div class="card-body">
      <div class="card-top">
        <div>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="card-ticker" style="color:${ss.text}">${r.ticker}</span>
            ${portBadge}
          </div>
          <span class="badge" style="background:${ss.bg};color:${ss.text};border:1px solid ${ss.border}">${r.sinyal}</span>
        </div>
        <div class="card-price">
          <div class="price-val">$${r.fiyat}</div>
          <div class="price-chg" style="color:${degCol}">${degStr}</div>
        </div>
      </div>
      <div class="signals">${sigs}</div>
      <div class="chart-wrap"><canvas id="chart-${r.ticker}"></canvas></div>
      <div class="price-levels">
        <div class="level-cell"><div class="level-label">Giriş</div><div class="level-val" style="color:var(--green2)">$${r.giris}</div></div>
        <div class="level-cell"><div class="level-label">Hedef</div><div class="level-val" style="color:#60a5fa">$${r.hedef}</div></div>
        <div class="level-cell"><div class="level-label">Stop</div><div class="level-val" style="color:var(--red2)">$${r.stop}</div></div>
      </div>
    </div>
  </div>`;
}

function openModal(ticker) {
  const r = ALL_DATA.find(d => d.ticker === ticker);
  if (!r || r.hata) return;
  if (modalChart) { modalChart.destroy(); modalChart = null; }

  const ss = SIGNAL_STYLE[r.sinyal] || SIGNAL_STYLE['DİKKAT'];

  const portBadge = r.portfolio ? '<span class="portfolio-badge" style="font-size:11px;padding:3px 9px">💼 Portföyümde</span>' : '';

  <div class="modal-header">

      </div>
      <div style="font-size:22px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:4px">
        $${r.fiyat} <span style="font-size:13px;color:${degCol}">${r.degisim>=0?'+':''}${r.degisim}%</span>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="decision-box" style="background:${ss.bg};border-color:${ss.border}">
      <div class="decision-label" style="color:${ss.text}">📊 Alım Kararı</div>
      <div class="decision-verdict" style="color:${ss.text}">${r.karar}</div>
      <div class="decision-row"><span class="decision-key">Risk / Ödül</span><span style="color:${rrColor};font-weight:700;font-family:'JetBrains Mono',monospace">1 : ${r.rr}</span></div>
      <div class="decision-row"><span class="decision-key">Giriş</span><span style="color:var(--green2);font-family:'JetBrains Mono',monospace">$${r.giris}</span></div>
      <div class="decision-row"><span class="decision-key">Hedef</span><span style="color:#60a5fa;font-family:'JetBrains Mono',monospace">$${r.hedef}</span></div>
      <div class="decision-row"><span class="decision-key">Stop</span><span style="color:var(--red2);font-family:'JetBrains Mono',monospace">$${r.stop}</span></div>
      <div class="decision-row"><span class="decision-key">Potansiyel Kazanç</span><span style="color:#60a5fa;font-family:'JetBrains Mono',monospace">+${((r.hedef-r.giris)/r.giris*100).toFixed(1)}%</span></div>
      <div class="decision-row"><span class="decision-key">Maks. Risk</span><span style="color:var(--red2);font-family:'JetBrains Mono',monospace">-${((r.giris-r.stop)/r.giris*100).toFixed(1)}%</span></div>
      <div class="rr-bar"><div class="rr-fill" style="width:${rrPct}%;background:${rrColor}"></div></div>
      <div style="font-size:9px;color:var(--muted);margin-top:5px">R/R ≥ 2 ideal • ≥ 3 güçlü sinyal</div>
    </div>

    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-label">Trend</div><div class="detail-val" style="color:${r.trend==='Yükselen'?'var(--green)':r.trend==='Düşen'?'var(--red)':'var(--muted)'}">${r.trend==='Yükselen'?'▲':r.trend==='Düşen'?'▼':'→'} ${r.trend}</div></div>
      <div class="detail-cell"><div class="detail-label">Hacim</div><div class="detail-val" style="color:${r.hacim==='Yüksek'?'var(--green)':r.hacim==='Düşük'?'var(--red)':'var(--muted)'}">${r.hacim} (${r.vol_ratio}x)</div></div>
      <div class="detail-cell"><div class="detail-label">SMA 50</div><div class="detail-val" style="color:${r.above50?'var(--green)':'var(--red)'}">${r.above50?'✓ Üzerinde':'✗ Altında'}</div></div>
      <div class="detail-cell"><div class="detail-label">SMA 200</div><div class="detail-val" style="color:${r.above200?'var(--green)':'var(--red)'}">${r.above200?'✓ Üzerinde':'✗ Altında'}</div></div>
      <div class="detail-cell"><div class="detail-label">52H Zirve</div><div class="detail-val" style="color:${r.near_52w?'var(--green)':'var(--muted)'}">%${r.pct_from_52w} uzakta</div></div>
      <div class="detail-cell"><div class="detail-label">Skor</div><div class="detail-val" style="color:${r.skor>=3?'var(--green)':r.skor<0?'var(--red)':'var(--yellow)'}">${r.skor > 0 ? '+':''}${r.skor} / 9</div></div>
    </div>

    <div class="vp-section">
      <div class="vp-title">📊 Volume Profile</div>
      <div class="vp-grid">
        <div class="vp-cell" style="border-color:rgba(239,68,68,.25)"><div style="font-size:9px;color:var(--red2);letter-spacing:1px;margin-bottom:3px">VAH</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--red2)">$${r.vah||'—'}</div><div style="font-size:8px;color:var(--muted)">Üst sınır</div></div>
        <div class="vp-cell" style="border-color:rgba(245,158,11,.25)"><div style="font-size:9px;color:var(--yellow);letter-spacing:1px;margin-bottom:3px">POC</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--yellow)">$${r.poc||'—'}</div><div style="font-size:8px;color:var(--muted)">En aktif</div></div>
        <div class="vp-cell" style="border-color:rgba(16,185,129,.25)"><div style="font-size:9px;color:var(--green);letter-spacing:1px;margin-bottom:3px">VAL</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--green)">$${r.val||'—'}</div><div style="font-size:8px;color:var(--muted)">Alt sınır</div></div>
      </div>
    </div>

    <div style="font-size:10px;color:var(--muted);text-align:center">Bu araç yatırım tavsiyesi değildir</div>
  </div>`;

  document.getElementById('modal').classList.add('open');

  // Modal chart
  setTimeout(() => {
    const ctx = document.getElementById('modalChart');
    if (ctx && r.chart_closes) {
      modalChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: r.chart_dates,
          datasets: [
            { label: 'Fiyat', data: r.chart_closes, borderColor: ss.accent, borderWidth:2, fill:true, backgroundColor: ss.accent+'20', pointRadius:0, tension:0.3 },
            r.sma50 ? { label:'SMA50', data: Array(r.chart_closes.length).fill(r.sma50), borderColor:'#f59e0b', borderWidth:1, borderDash:[4,4], pointRadius:0, fill:false } : null,
            r.sma200 ? { label:'SMA200', data: Array(r.chart_closes.length).fill(r.sma200), borderColor:'#8b5cf6', borderWidth:1, borderDash:[4,4], pointRadius:0, fill:false } : null,
          ].filter(Boolean)
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{labels:{color:'#6b7280',font:{size:10}}}},
          scales:{
            x:{display:true,ticks:{color:'#374151',maxTicksLimit:6,font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},
            y:{display:true,ticks:{color:'#374151',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}
          }
        }
      });
    }
  }, 100);
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    if (modalChart) { modalChart.destroy(); modalChart = null; }
  }
}

// Init
renderStats();
renderGrid();
</script>
</body>
</html>
