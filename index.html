<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CANSLIM Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#05070f;--bg2:#0d1117;--bg3:#161b24;--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#4b5563;--green:#10b981;--green2:#34d399;--red:#ef4444;--red2:#f87171;--yellow:#f59e0b;--blue:#3b82f6;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0d1117,#111827);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1400px;margin:0 auto}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.timestamp{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.nav{display:flex;gap:4px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid transparent;background:none;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border)}
.tab.port.active{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.3)}
.tf-row{display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);align-items:center;flex-wrap:wrap}
.tf-btn{padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:'JetBrains Mono',monospace;transition:all .2s}
.tf-btn.active{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.4)}
.tf-btn.star{position:relative}
.tf-btn.star::after{content:"★";position:absolute;top:-5px;right:-4px;font-size:8px;color:var(--yellow)}
.tf-hint{font-size:10px;color:var(--muted)}
.stats{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.pill.g{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.25)}
.pill.r{background:rgba(239,68,68,.1);color:var(--red2);border-color:rgba(239,68,68,.25)}
.pill.y{background:rgba(245,158,11,.1);color:var(--yellow);border-color:rgba(245,158,11,.25)}
.pill.b{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.25)}
.pill.m{background:var(--bg3);color:var(--muted);border-color:var(--border)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.main{padding:14px 20px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.accent{height:3px}
.cbody{padding:12px 14px}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.ticker{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1}
.cpr{text-align:right}
.pval{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
.pchg{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.port-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25);margin-left:5px}
.sigs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.sp{font-size:9px;padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace}
.sg{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.sb{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.sn{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.chart-w{height:75px;margin-top:8px}
.lvls{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
.lv{background:var(--bg3);border-radius:5px;padding:6px;text-align:center;border:1px solid var(--border)}
.ll{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.lval{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.mhead{padding:18px 18px 0;display:flex;justify-content:space-between;align-items:flex-start}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px}
.mclose{background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mclose:hover{color:var(--text)}
.mbody{padding:14px 18px 18px}
.mchartw{height:150px;margin-bottom:14px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.dc{background:var(--bg3);border-radius:7px;padding:9px 11px;border:1px solid var(--border)}
.dl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.dv{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.dbox{border-radius:9px;padding:13px;margin-bottom:12px;border:1px solid}
.dlbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.dverd{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:8px}
.drow{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.dkey{color:var(--muted)}
.rrbar{height:4px;background:var(--bg);border-radius:2px;margin-top:7px;overflow:hidden}
.rrfill{height:100%;border-radius:2px;transition:width .8s ease}
.vpbox{background:var(--bg3);border-radius:7px;padding:10px;border:1px solid var(--border);margin-bottom:12px}
.vptitle{font-size:9px;color:#60a5fa;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.vpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.vpc{background:var(--bg2);border-radius:5px;padding:7px;text-align:center;border:1px solid}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
</style>
</head>

function setTab(t,el){curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderGrid();}
function setTf(tf,el){curTf=tf;document.querySelectorAll('.tf-btn').forEach(b=>b.classList.toggle('active',b.dataset.tf===tf));curData=[...(TF_DATA[tf]||TF_DATA['1d'])];renderStats();renderGrid();}
function filtered(){let d=curData.filter(r=>!r.hata);if(curTab==='port')return d.filter(r=>PORT.includes(r.ticker));if(curTab==='buy')return d.filter(r=>r.sinyal==='GUCLU AL'||r.sinyal==='AL');if(curTab==='sell')return d.filter(r=>r.sinyal==='SAT');return d;}
function renderStats(){const d=curData.filter(r=>!r.hata);const cnt={};d.forEach(r=>{cnt[r.sinyal]=(cnt[r.sinyal]||0)+1;});document.getElementById('stats').innerHTML=`<div class="pill g"><div class="dot"></div>Guclu Al: ${cnt['GUCLU AL']||0}</div><div class="pill g"><div class="dot"></div>Al: ${cnt['AL']||0}</div><div class="pill y"><div class="dot"></div>Dikkat: ${cnt['DIKKAT']||0}</div><div class="pill r"><div class="dot"></div>Sat: ${cnt['SAT']||0}</div><div class="pill b" style="margin-left:auto"><div class="dot"></div>Portfolyo: ${PORT.length}</div><div class="pill m"><div class="dot"></div>${d.length} analiz</div>`;}
function renderGrid(){Object.values(miniCharts).forEach(c=>c.destroy());miniCharts={};const f=filtered();const grid=document.getElementById('grid');if(!f.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Hisse bulunamadi</div>';return;}grid.innerHTML=f.map(r=>buildCard(r)).join('');f.forEach(r=>{const ctx=document.getElementById('mc-'+r.ticker);if(ctx&&r.chart_closes&&r.chart_closes.length){const ss=SS[r.sinyal]||SS['DIKKAT'];miniCharts['m'+r.ticker]=new Chart(ctx,{type:'line',data:{labels:r.chart_dates,datasets:[{data:r.chart_closes,borderColor:ss.ac,borderWidth:1.5,fill:true,backgroundColor:ss.ac+'18',pointRadius:0,tension:0.4}]},options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:500},responsive:true,maintainAspectRatio:false}});}});}
function buildCard(r){const ss=SS[r.sinyal]||SS['DIKKAT'];const dc=r.degisim>=0?'var(--green2)':'var(--red2)';const ds=(r.degisim>=0?'+':'')+r.degisim+'%';const escol=r.entry_score>=75?'var(--green)':r.entry_score>=60?'var(--green2)':r.entry_score>=45?'var(--yellow)':r.entry_score>=30?'var(--red2)':'var(--red)';const pvcol=r.price_vs_color==='green'?'var(--green)':r.price_vs_color==='yellow'?'var(--yellow)':'var(--red2)';const sigs=[{l:'Trend',v:r.trend==='Yukselen'?'Yukseliyor':r.trend==='Dusen'?'Dusuyor':'Yatay',g:r.trend==='Yukselen'?true:r.trend==='Dusen'?false:null},{l:'SMA50',v:r.above50?'Uzerinde':'Altinda',g:r.above50},{l:'SMA200',v:r.above200?'Uzerinde':'Altinda',g:r.above200},{l:'RSI',v:r.rsi||'?',g:r.rsi?r.rsi<30?true:r.rsi>70?false:null:null},{l:'52W',v:'%'+r.pct_from_52w+' uzak',g:r.near_52w}].map(s=>`<span class="sp ${s.g===true?'sg':s.g===false?'sb':'sn'}">${s.l}: ${s.v}</span>`).join('');return `<div class="card" style="border-color:${r.portfolio?'rgba(16,185,129,.25)':ss.bd}" onclick="openM('${r.ticker}')"><div class="accent" style="background:linear-gradient(90deg,${ss.ac},${ss.ac}88)"></div><div class="cbody"><div class="ctop"><div><div style="display:flex;align-items:center;gap:4px"><span class="ticker" style="color:${ss.tx}">${r.ticker}</span>${r.portfolio?'<span class="port-badge">P</span>':''}</div><span class="badge" style="background:${ss.bg};color:${ss.tx};border:1px solid ${ss.bd}">${ss.lbl}</span></div><div class="cpr"><div class="pval">$${r.fiyat}</div><div class="pchg" style="color:${dc}">${ds}</div>${r.pe_fwd?`<div style="font-size:9px;color:var(--muted)">FwdPE:${r.pe_fwd.toFixed(1)}</div>`:''}</div></div><div class="sigs">${sigs}</div><div style="margin-top:6px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:9px;color:var(--muted)">Giris Kalitesi</span><span style="font-size:11px;font-weight:700;color:${escol}">${r.entry_score}/100</span></div><div style="height:4px;background:var(--bg function openM(ticker){const r=curData.find(d=>d.ticker===ticker);if(!r||r.hata)return;if(mChart){mChart.destroy();mChart=null;}const ss=SS[r.sinyal]||SS['DIKKAT'];const rrP=Math.min((r.rr/4)*100,100);const rrC=r.rr>=3?'var(--green)':r.rr>=2?'var(--green2)':r.rr>=1?'var(--yellow)':'var(--red2)';const dc=r.degisim>=0?'var(--green2)':'var(--red2)';const kc={'GUCLU AL':'#10b981','AL':'#34d399','DIKKATLI':'#f59e0b','GECME':'#f87171'};const klbl={'GUCLU AL':'GUCLU AL','AL':'AL','DIKKATLI':'DIKKATLI','GECME':'GECME'};const escol=r.entry_score>=75?'var(--green)':r.entry_score>=60?'var(--green2)':r.entry_score>=45?'var(--yellow)':r.entry_score>=30?'var(--red2)':'var(--red)';const pvcol=r.price_vs_color==='green'?'var(--green)':r.price_vs_color==='yellow'?'var(--yellow)':'var(--red2)';document.getElementById('modal').innerHTML=`<div class="mhead"><div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="mtitle" style="color:${ss.tx}">${r.ticker}</span><span class="badge" style="background:${ss.bg};color:${ss.tx};border:1px solid ${ss.bd};font-size:12px">${ss.lbl}</span>${r.portfolio?'<span class="port-badge" style="font-size:11px;padding:3px 8px">Portfolyo</span>':''}</div><div style="font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:4px">$${r.fiyat} <span style="font-size:12px;color:${dc}">${(r.degisim>=0?'+':'')+r.degisim}%</span></div></div><button class="mclose" onclick="closeM()">X</button></div><div class="mbody"><div class="mchartw"><canvas id="mchart"></canvas></div><div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Giris Kalitesi</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${escol}">${r.entry_score}<span style="font-size:13px;color:var(--muted)">/100</span></span><span style="font-size:13px;font-weight:600;color:${escol}">${r.entry_label||''}</span></div><div style="height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:${r.entry_score}%;background:${escol};border-radius:3px"></div></div><div style="display:flex;justify-content:space-between;font-size:11px"><div><span style="color:var(--muted)">Su anki fiyat: </span><span style="color:${pvcol};font-weight:600">${r.price_vs_ideal}</span></div><div><span style="color:var(--muted)">Ideal bolge: </span><span style="color:var(--green2);font-family:'JetBrains Mono',monospace">$${r.ideal_entry_low} - $${r.ideal_entry_high}</span></div></div></div><div class="dbox" style="background:${ss.bg};border-color:${ss.bd};margin-bottom:12px"><div class="dlbl" style="color:${ss.tx}">Alim Karari R/R</div><div class="dverd" style="color:${kc[r.karar]||'var(--muted)'}">${klbl[r.karar]||r.karar}</div><div class="drow"><span class="dkey">Risk / Odul</span><span style="color:${rrC};font-weight:700;font-family:'JetBrains Mono',monospace">1 : ${r.rr}</span></div><div class="drow"><span class="dkey">Ideal Giris</span><span style="color:var(--green2);font-family:'JetBrains Mono',monospace">$${r.ideal_entry_low} - $${r.ideal_entry_high}</span></div><div class="drow"><span class="dkey">Hedef</span><span style="color:#60a5fa;font-family:'JetBrains Mono',monospace">$${r.hedef}</span></div><div class="drow"><span class="dkey">Stop-Loss</span><span style="color:var(--red2);font-family:'JetBrains Mono',monospace">$${r.stop}</span></div><div class="drow"><span class="dkey">Kazanc Potansiyeli</span><span style="color:#60a5fa;font-family:'JetBrains Mono',monospace">+${((r.hedef-r.ideal_entry_high)/r.ideal_entry_high*100).toFixed(1)}%</span></div><div class="drow"><span class="dkey">Maks. Risk</span><span style="color:var(--red2);font-family:'JetBrains Mono',monospace">-${((r.ideal_entry_high-r.stop)/r.ideal_entry_high*100).toFixed(1)}%</span></div><div class="rrbar"><div class="rrfill" style="width:${rrP}%;background:${rrC}"></div></div></div><div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Teknik Analiz</div><div class="dgrid" style="margin-bottom:12px"><div class="dc"><div class="dl">Trend</div><div class="dv" style="color:${r.trend==='Yukselen'?'var(--green)':r.trend==='Dusen'?'var(--red)':'var(--muted)'}">${r.trend}</div></div><div class="dc"><div class="dl">RSI 14</div><div class="dv" style="color:${r.rsi?r.rsi<30?'var(--green)':r.rsi>70?'var(--red)':'var(--yellow)':'var(--muted)'}">${r.rsi||'?'} ${r.rsi?r.rsi<30?'Asiri Satim':r.rsi>70?'Asiri Alim':'Notr':''}</div></div><div class="dc"><div class="dl">SMA 50</div><div class="dv" style="color:${r.above50?'var(--green)':'var(--red)'}">${r.above50?'Uzerinde':'Altinda'} ${r.sma50_dist!=null?'('+r.sma50_dist+'%)':''}</div></div><div class="dc"><div class="dl">SMA 200</div><div class="dv" style="color:${r.above200?'var(--green)':'var(--red)'}">${r.above200?'Uzerinde':'Altinda'} ${r.sma200_dist!=null?'('+r.sma200_dist+'%)':''}</div></div><div class="dc"><div class="dl">52H Pozisyon</div><div class="dv" style="color:${r.w52_position<=30?'var(--green)':r.w52_position>=85?'var(--red)':'var(--yellow)'}">${r.w52_position}%</div></div><div class="dc"><div class="dl">Hacim</div><div class="dv" style="color:${r.hacim==='Yuksek'?'var(--green)':r.hacim==='Dusuk'?'var(--red)':'var(--muted)'}">${r.hacim} (${r.vol_ratio}x)</div></div></div><div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Destek Seviyeleri ve Konsensus</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;font-weight:600;color:var(--text)">Konsensus Bolgesi</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green2)">$${r.consensus_low} - $${r.consensus_high}</span>
      </div>
      ${Object.entries(r.level_details||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
        const pct = ((price-v)/price*100).toFixed(1);
        const col = v>=r.consensus_low&&v<=r.consensus_high?'var(--green)':v>price*0.9?'var(--yellow)':'var(--muted)';
        return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:10px;color:var(--muted)">${k}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:9px;color:var(--muted)">-%${pct}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:${col}">$${v}</span>
          </div>
        </div>`;
      }).join('')}
      ${r.fair_price_pe?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:10px;color:var(--muted)">Fwd P/E Adil Deger</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#60a5fa">$${r.fair_price_pe}</span></div>`:''}
      ${r.fair_price_analyst?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:10px;color:var(--muted)">Analist Hedef</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#a78bfa">$${r.fair_price_analyst}</span></div>`:''}
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px">
          <div style="text-align:center;background:var(--bg2);border-radius:4px;padding:5px"><div style="font-size:8px;color:var(--muted)">Fib 38.2%</div><div style="font-size:10px;font-weight:600;color:var(--yellow)">$${r.fib_382||'?'}</div></div>
          <div style="text-align:center;background:var(--bg2);border-radius:4px;padding:5px"><div style="font-size:8px;color:var(--muted)">Fib 50%</div><div style="font-size:10px;font-weight:600;color:var(--yellow)">$${r.fib_500||'?'}</div></div>
          <div style="text-align:center;background:var(--bg2);border-radius:4px;padding:5px"><div style="font-size:8px;color:var(--muted)">Fib 61.8%</div><div style="font-size:10px;font-weight:600;color:var(--yellow)">$${r.fib_618||'?'}</div></div>
        </div>
      </div>
    </div>
    <div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Temel Analiz</div><div class="dgrid" style="margin-bottom:12px"><div class="dc"><div class="dl">Forward PE</div><div class="dv" style="color:${r.pe_fwd?r.pe_fwd<25?'var(--green)':r.pe_fwd<40?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.pe_fwd?r.pe_fwd.toFixed(1):'?'}</div></div><div class="dc"><div class="dl">Trailing PE</div><div class="dv" style="color:var(--muted)">${r.pe_ttm?r.pe_ttm.toFixed(1):'?'}</div></div><div class="dc"><div class="dl">PEG Orani</div><div class="dv" style="color:${r.peg?r.peg<1?'var(--green)':r.peg<2?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.peg?r.peg.toFixed(2):'?'} ${r.peg?r.peg<1?'Ucuz':r.peg<2?'Makul':'Pahali':''}</div></div><div class="dc"><div class="dl">PS Orani</div><div class="dv" style="color:var(--muted)">${r.ps?r.ps.toFixed(1):'?'}</div></div><div class="dc"><div class="dl">EPS Buyume</div><div class="dv" style="color:${r.eps_growth?r.eps_growth>=20?'var(--green)':r.eps_growth>=0?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.eps_growth!=null?r.eps_growth+'%':'?'}</div></div><div class="dc"><div class="dl">Gelir Buyume</div><div class="dv" style="color:${r.rev_growth?r.rev_growth>=15?'var(--green)':r.rev_growth>=0?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.rev_growth!=null?r.rev_growth+'%':'?'}</div></div><div class="dc"><div class="dl">Net Marjin</div><div class="dv" style="color:${r.net_margin?r.net_margin>=15?'var(--green)':r.net_margin>=5?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.net_margin!=null?r.net_margin+'%':'?'}</div></div><div class="dc"><div class="dl">ROE</div><div class="dv" style="color:${r.roe?r.roe>=15?'var(--green)':r.roe>=5?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.roe!=null?r.roe+'%':'?'}</div></div><div class="dc"><div class="dl">Brut Marjin</div><div class="dv" style="color:${r.gross_margin?r.gross_margin>=40?'var(--green)':r.gross_margin>=20?'var(--yellow)':'var(--red)':'var(--muted)'}">${r.gross_margin!=null?r.gross_margin+'%':'?'}</div></div><div class="dc"><div class="dl">Sektor</div><div class="dv" style="color:var(--muted);font-size:11px">${r.sector||'?'}</div></div></div><div class="vpbox"><div class="vptitle">Volume Profile</div><div class="vpgrid"><div class="vpc" style="border-color:rgba(239,68,68,.25)"><div style="font-size:9px;color:var(--red2);margin-bottom:2px">VAH</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--red2)">$${r.vah||'?'}</div><div style="font-size:8px;color:var(--muted)">Ust sinir</div></div><div class="vpc" style="border-color:rgba(245,158,11,.25)"><div style="font-size:9px;color:var(--yellow);margin-bottom:2px">POC</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--yellow)">$${r.poc||'?'}</div><div style="font-size:8px;color:var(--muted)">En aktif</div></div><div class="vpc" style="border-color:rgba(16,185,129,.25)"><div style="font-size:9px;color:var(--green);margin-bottom:2px">VAL</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--green)">$${r.val||'?'}</div><div style="font-size:8px;color:var(--muted)">Alt sinir</div></div></div></div><div style="font-size:10px;color:var(--muted);text-align:center">Bu arac yatirim tavsiyesi degildir</div></div>`;document.getElementById('overlay').classList.add('open');setTimeout(()=>{const ctx=document.getElementById('mchart');if(ctx&&r.chart_closes){mChart=new Chart(ctx,{type:'line',data:{labels:r.chart_dates,datasets:[{label:'Fiyat',data:r.chart_closes,borderColor:ss.ac,borderWidth:2,fill:true,backgroundColor:ss.ac+'20',pointRadius:0,tension:0.3},r.sma50?{label:'SMA50',data:Array(r.chart_closes.length).fill(r.sma50),borderColor:'#f59e0b',borderWidth:1.5,borderDash:[5,5],pointRadius:0,fill:false}:null,r.sma200?{label:'SMA200',data:Array(r.chart_closes.length).fill(r.sma200),borderColor:'#8b5cf6',borderWidth:1.5,borderDash:[5,5],pointRadius:0,fill:false}:null].filter(Boolean)},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7280',font:{size:10}}}},scales:{x:{display:true,ticks:{color:'#374151',maxTicksLimit:5,font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},y:{display:true,ticks:{color:'#374151',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}}}});}},100);}
function closeM(e){if(!e||e.target===document.getElementById('overlay')){document.getElementById('overlay').classList.remove('open');if(mChart){mChart.destroy();mChart=null;}}}
renderStats();
renderGrid();
</script>
